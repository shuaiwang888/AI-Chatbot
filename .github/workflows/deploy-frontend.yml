name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

# 允许并发部署, 但同 branch 排队
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          # 必填: 后端 API 完整 URL (末尾不带 /). 例: https://yourname-ai-chatbot.hf.space/api/v1
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          # GITHUB_REPOSITORY 是 GH Actions 自动注入的环境变量 (形如 "owner/Repo-Name"),
          # vite.config.ts 会从中提取仓库名作为 base path, 大小写自动与 GitHub 仓库匹配.
          # 手动 override: 在 repo Variables 里设 VITE_REPO_NAME (优先级更高).
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
