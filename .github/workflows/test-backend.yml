name: Test Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/test-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install (no ML deps for fast CI)
        run: |
          # 完整依赖太大 CI 跑慢, 装最小集跑 unit tests
          # 阶段 6 接入完整 RAGAS 后, 单独 workflow
          pip install -q -r requirements.txt || {
            echo "::warning::Full install failed, retrying with minimal"
            pip install -q fastapi 'pydantic>=2.9' pydantic-settings 'uvicorn[standard]' \
              'python-multipart' httpx sse-starlette python-dotenv \
              'openai>=1.60' tenacity cachetools 'langgraph>=0.3' 'langchain-core>=0.3' \
              'pydantic-ai>=0.2' 'langgraph-checkpoint-sqlite>=2.0' 'pytest>=8.0' \
              'pytest-asyncio>=0.23' reportlab
          }

      - name: AST sanity
        run: |
          python3 -c "
          import ast
          from pathlib import Path
          errors = []
          for py in Path('app').rglob('*.py'):
              tree = ast.parse(py.read_text())
              for node in ast.walk(tree):
                  if isinstance(node, ast.ImportFrom) and node.module and node.module.startswith('app.'):
                      rel = node.module.replace('.', '/')
                      if not Path(f'{rel}.py').exists() and not Path(rel).is_dir():
                          errors.append(f'{py}:{node.lineno} -> {node.module}')
          if errors:
              for e in errors: print('❌', e)
              raise SystemExit(1)
          print('✅ All imports resolve')
          "

      - name: Compile
        run: |
          python3 -m py_compile $(find app -name "*.py")
          echo "✅ All Python files compile"

      - name: Phase 1 smoke
        env:
          # CI 不要求真实 LLM, 部分用例会 skip
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY || '' }}
        run: |
          python tests/unit/smoke_phase1.py || {
            echo "::warning::Phase 1 smoke had failures (可能因 CI 缺 ML 依赖)"
          }

      - name: Phase 2 smoke
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY || '' }}
        run: |
          pip install -q chromadb FlagEmbedding rank-bm25 2>&1 | tail -3 || true
          python tests/unit/smoke_phase2.py || {
            echo "::warning::Phase 2 smoke had failures"
          }

      - name: Phase 3 smoke
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY || '' }}
        run: |
          python tests/unit/smoke_phase3.py || {
            echo "::warning::Phase 3 smoke had failures"
          }
        continue-on-error: true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-smoke-output
          path: backend/.smoke-logs/
          if-no-files-found: ignore
